<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Kendali Multi-CCTV & Cetak Tiket</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1450px; margin: auto; background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        
        .top-bar { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        button { padding: 14px 35px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; color: white; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-connect { background-color: #007bff; }
        .btn-connect:hover { background-color: #0056b3; transform: translateY(-2px); }
        .btn-refresh { background-color: #28a745; }
        .btn-refresh:hover { background-color: #218838; transform: translateY(-2px); }
        .btn-ticket { background-color: #ffc107; color: #222; font-size: 18px; }
        .btn-ticket:hover { background-color: #e0a800; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        
        .main-layout { display: flex; gap: 25px; align-items: flex-start; margin-top: 10px; flex-wrap: wrap; }
        .cctv-grid { flex: 3; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; min-width: 60%; }
        
        .cctv-box { background: #1a1a24; border-radius: 8px; border: 3px solid #e2e8f0; overflow: hidden; position: relative; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .cctv-box img { width: 100%; height: 100%; object-fit: contain; display: none; }
        
        .cctv-label { position: absolute; top: 12px; right: 12px; background: rgba(0, 123, 255, 0.9); padding: 5px 12px; border-radius: 4px; color: white; font-weight: bold; font-size: 12px; letter-spacing: 1px; z-index: 10; }
        .status-badge { position: absolute; bottom: 12px; left: 12px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        
        .side-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 320px; }
        .ticket-view { background: #fffdf5; color: #333; padding: 30px 20px; border-radius: 10px; border: 2px dashed #ffc107; min-height: 230px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        
        .ticket-view::before, .ticket-view::after { content: ''; position: absolute; width: 20px; height: 20px; background: #ffffff; border-radius: 5px; top: 50%; }
        .ticket-view::before { left: -11px; border-right: 1px solid #ffde73; }
        .ticket-view::after { right: -11px; border-left: 1px solid #ffde73; }
        
        .placeholder-text { color: #8888a0; font-style: italic; font-size: 16px; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #222;">🎛️ Sistem Monitoring Multi-CCTV & Gate Karcis Parkir</h1>
    
    <div class="top-bar">
        <button class="btn-connect" id="btnConnect" onclick="toggleKoneksi()">🔌 AKTIFKAN MONITORING</button>
        <button class="btn-refresh" id="btnRefresh" onclick="refreshKamera()" style="display: none;">🔄 REFRESH SNAPSHOT</button>
        <button class="btn-ticket" onclick="requestCetakTiket()">🎫 CETAK TIKET MASUK</button>
    </div>

    <div class="main-layout">
        <div class="cctv-grid">
            <div class="cctv-box">
                <span class="cctv-label" id="labelA">📷 AREA A</span>
                <span id="p1" class="placeholder-text">Kamera Utama Gate Masuk (Offline)</span>
                <img id="cam1" alt="CCTV Monitor 1">
                <span class="status-badge" id="ts1" style="display: none;">Snapshot</span>
            </div>
            <div class="cctv-box">
                <span class="cctv-label" id="labelB">📷 AREA B</span>
                <span id="p2" class="placeholder-text">Kamera Cadangan Lantai 2 (Offline)</span>
                <img id="cam2" alt="CCTV Monitor 2">
                <span class="status-badge" id="ts2" style="display: none;">Snapshot</span>
            </div>
        </div>

        <div class="side-panel">
            <div class="ticket-view" id="tiketResult">
                <h3 style="color: #777; margin-top: 70px; font-weight: 500;">Menunggu Pemicu Sensor Gate...</h3>
            </div>
        </div>
    </div>
</div>

<script>
    const baseUrl = "https://unknwnpeople-smart-parking-api.hf.space"; 
    let isLive = false;
    let autoRefreshInterval = null;

    function toggleKoneksi() {
        const btn = document.getElementById('btnConnect');
        const btnRef = document.getElementById('btnRefresh');
        
        if (!isLive) {
            // Mengaktifkan monitoring
            isLive = true;
            btn.innerHTML = "🛑 MATIKAN MONITORING";
            btn.style.backgroundColor = "#dc3545";
            btnRef.style.display = "inline-block";
            
            document.getElementById('cam1').style.display = "block";
            document.getElementById('cam2').style.display = "block";
            document.getElementById('ts1').style.display = "block";
            document.getElementById('ts2').style.display = "block";
            document.getElementById('p1').style.display = "none";
            document.getElementById('p2').style.display = "none";
            
            document.getElementById('labelA').innerHTML = "🟢 MONITORING AREA A";
            document.getElementById('labelB').innerHTML = "🟢 MONITORING AREA B";

            refreshKamera();
            // Otomatis mengambil snapshot baru setiap 5 detik agar tidak membebani CPU secara kontinu
            autoRefreshInterval = setInterval(refreshKamera, 5000);
        } else {
            // Mematikan monitoring
            isLive = false;
            btn.innerHTML = "🔌 AKTIFKAN MONITORING";
            btn.style.backgroundColor = "#007bff";
            btnRef.style.display = "none";
            
            document.getElementById('cam1').style.display = "none";
            document.getElementById('cam2').style.display = "none";
            document.getElementById('ts1').style.display = "none";
            document.getElementById('ts2').style.display = "none";
            document.getElementById('p1').style.display = "block";
            document.getElementById('p2').style.display = "block";
            
            document.getElementById('labelA').innerHTML = "📷 AREA A";
            document.getElementById('labelB').innerHTML = "📷 AREA B";
            
            clearInterval(autoRefreshInterval);
        }
    }

    function refreshKamera() {
        if (!isLive) return;
        
        const cam1 = document.getElementById('cam1');
        const cam2 = document.getElementById('cam2');
        const ts1 = document.getElementById('ts1');
        const ts2 = document.getElementById('ts2');
        
        // Trik cache-busting (?t=...) dipadukan dengan pemanggilan langsung endpoint streaming sebagai single frame
        const timestamp = new Date().getTime();
        cam1.src = `${baseUrl}/video_feed/1?t=${timestamp}`;
        cam2.src = `${baseUrl}/video_feed/2?t=${timestamp}`;
        
        const waktuUpdate = new Date().toLocaleTimeString();
        ts1.innerHTML = `Terupdate: ${waktuUpdate}`;
        ts2.innerHTML = `Terupdate: ${waktuUpdate}`;
    }

    async function requestCetakTiket() {
        if (!isLive) { alert("Nyalakan koneksi monitor CCTV terlebih dahulu!"); return; }
        
        const tiketContainer = document.getElementById('tiketResult');
        tiketContainer.innerHTML = "<i style='display:block; margin-top:70px; color:#777;'>Menganalisis matriks spasial ruang kosong...</i>";

        try {
            const response = await fetch(`${baseUrl}/cetak_tiket`, { method: "POST" });
            const data = await response.json();

            if (data.status === "penuh") {
                tiketContainer.innerHTML = `<h2 style='color:#dc3545; margin-top:50px;'>🚨<br>MOHON MAAF<br>PARKIR PENUH!</h2>`;
            } else {
                const waktu = new Date().toLocaleTimeString();
                tiketContainer.innerHTML = `
                    <h3 style="margin: 0 0 5px 0; letter-spacing:2px; font-weight:800; color:#111;">🎫 STRUK KARCIS PARKIR</h3>
                    <p style="margin: 2px 0; font-size:13px; color:#555;">Waktu: <b>${waktu}</b> | Gate: <b>UTAMA</b></p>
                    <hr style="border-top: 2px dashed #bbb; margin: 15px 0;">
                    <p style="margin: 0; font-size: 13px; color: #666; font-weight:600;">REKOMENDASI LOKASI BLOK KOSONG:</p>
                    <h1 style="font-size: 60px; margin: 5px 0 0 0; color: #28a745; font-weight: 900; font-family: 'Courier New', Courier, monospace;">${data.slot}</h1>
                    <p style="margin: 15px 0 0 0; font-size: 11px; color: #777;">Silakan parkir kendaraan Anda pada blok yang tertera di atas.</p>
                `;
                // Sesaat setelah tiket dicetak, perbarui info kamera demi validasi data visual terkini
                refreshKamera();
            }
        } catch (error) {
            tiketContainer.innerHTML = `<p style='color:#dc3545; margin-top:60px;'><b>Koneksi Gagal.</b><br><small>Gagal menghubungi server Hugging Face backend.</small></p>`;
        }
    }
</script>

</body>
</html>
